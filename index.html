    <div id="matcha-stage"></div>

    <script id="matcha-source" type="text/markdown">
      <!-- layout: center -->
      <!-- transition: fade -->

      # 🍵 Matcha V7

      <!-- layout: center -->
      <!-- transition: slide -->

      你好，这里是==Matcha==

      高亮会在分步之间==自动插入==额外步骤

      ## 嵌套分步

      我叫==jae==，我是一名==全栈==独立==开发者==

      <!-- step: fade -->

      同一步中的多个高亮会==按顺序==逐个展示

      ---

      <!-- layout: center -->
      <!-- transition: slide -->

      ## 分步展示演示

      这是第一步，进入页面就能看到

      <!-- step: fade -->

      第二步，点击后淡入显示

      <!-- step: slide-up -->

      第三步，从下方滑入

      <!-- step: zoom -->

      第四步，缩放出现 ✨

      ---

      <!-- layout: center -->
      <!-- transition: zoom -->
      <!-- theme: ocean -->

      ## 🌊 每页独立主题

      这一页使用 **Ocean** 主题

      <!-- step: fade -->

      主题和动画都是每页独立的

      <!-- step: slide-left -->

      语法：`<!-- theme: ocean -->`

      ---

      <!-- layout: center -->
      <!-- transition: flip -->
      <!-- theme: sakura -->

      ## 🌸 Sakura 主题

      <!-- step: fade -->

      温柔的樱花粉色调

      <!-- step: slide-up -->

      每页可以设置不同的主题和动画

      ---

      <!-- layout: cols -->
      <!-- transition: slide -->
      <!-- theme: matcha -->

      ## 分步语法

      使用 `<!-- step -->` 分隔

      <!-- step: fade -->

      ```markdown
      第一步内容

      <!-- step: fade -->

      第二步内容（淡入）

      <!-- step: slide-up -->

      第三步内容（滑入）
      ```

      +++

      ## 可用效果

      <!-- step: fade -->

      | 效果       | 说明     |
      | ---------- | -------- |
      | fade       | 淡入     |
      | slide-up   | 从下滑入 |
      | slide-down | 从上滑入 |
      | slide-left | 从右滑入 |
      | zoom       | 缩放     |
      | bounce     | 弹跳     |

      ---

      <!-- layout: doc -->
      <!-- transition: slideUp -->

      ## 交互方式

      **下一步**：点击、→、↓、空格、Enter

      <!-- step: fade -->

      **上一步**：右键点击、←、↑

      <!-- step: fade -->

      **快捷跳转**：Home / End

      <!-- step: bounce -->

      > 💡 分步内容**累加显示**，就像 PowerPoint！

      ---

      <!-- layout: center -->
      <!-- transition: cube -->
      <!-- theme: sunset -->

      ## 🌅 Sunset 主题

      <!-- step: fade -->

      温暖的日落橙色调

      <!-- step: zoom -->

      **每个主题都是每页独立的**

      ---

      <!-- layout: cols -->
      <!-- transition: fade -->
      <!-- theme: ocean -->

      ![Code](https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=800&q=80)

      +++

      ## 📸 图文混排

      <!-- step: fade -->

      支持多种布局

      <!-- step: slide-left -->

      - 居中布局 (center)
      - 横分布局 (cols)
      - 纵分布局 (rows)
      - 文档布局 (doc)

      <!-- step: zoom -->

      **每种布局都支持分步！**

      ---

      <!-- layout: cols -->
      <!-- transition: fade -->
      <!-- theme: ocean -->

      ## 高亮语法

      使用 `==内容==` 标记

      <!-- step: fade -->

      ```markdown
      你好，这里是==Matcha==

      我是==全栈==独立==开发者==
      ```

      +++

      ## 效果说明

      <!-- step: fade -->

      - 整体内容==透明度降低==
      - 高亮内容==保持不透明==
      - 形成==聚焦效果==

      <!-- step: slide-left -->

      > 💡 高亮完成后直接进入下一步

      ---

      <!-- layout: center -->
      <!-- transition: zoom -->
      <!-- theme: matcha -->

      # 🙏 感谢使用

      <!-- step: fade -->

      ### Matcha.js V7

      <!-- step: slide-up -->

      ✨ 每页独立主题 · 🎬 流畅动画 · 👆 分步展示 · ==高亮聚焦==

      <!-- step: bounce -->

      **超越 Reveal.js 的轻量框架**
    </script>

    <script type="module">
      import Matcha from "./matcha.js";

      const app = new Matcha({
        progressBar: {
          visible: true,
          color: "#00c853",
          position: "bottom",
        },
        style: {
          theme: "matcha",
        },
        transition: {
          type: "fade",
          duration: 700,
        },
        fragment: {
          duration: 500,
        },
      });

      app.start();
      window.matcha = app;
    </script>
  </body>
