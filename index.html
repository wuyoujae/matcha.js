      # 🍵 Matcha V5

      ### 轻量 · 模块化 · 超越 Reveal.js

      *按方向键或点击继续 →*

      ---

      <!-- layout: center -->

      ## 为什么选择 Matcha？

      | 特性 | Reveal.js | Matcha |
      |------|-----------|--------|
      | 核心体积 | ~400KB | <15KB |
      | 布局系统 | 仅居中 | **4种布局** |
      | 模块化 | 插件模式 | **完全模块化** |
      | 过渡动画 | 内置固定 | **8种可配置** |

      ---

      <!-- transition: slide -->
      <!-- layout: doc -->

      ## 📦 模块化架构

      Matcha 的每个功能都是独立模块：

      - **markdowmParse.js** - Markdown 解析（支持表格！）
      - **progressBar.js** - 进度条控制
      - **style.js** - 主题与样式
      - **layout.js** - 布局系统
      - **transition.js** - 过渡动画 ✨ *新增*

      > 开发者可以轻松替换或扩展任何模块！

      ## ⚡ 快速开始

      ```html
      <script type="module">
        import Matcha from "./matcha.js";

        new Matcha({
          transition: { type: "slide", duration: 800 },
          style: { theme: "ocean" }
        }).start();
      </script>
      ```

    <script type="module">
      import Matcha from "./matcha.js";

      const app = new Matcha({

          visible: true,
          color: "#00c853",

        style: {
          theme: "matcha",
        },
        transition: {
          type: "fade",
          duration: 600,
        },
      });

      app.start();
