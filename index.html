      ## 分步语法

      使用 `<!-- step -->` 分隔

      <!-- step: fade -->

      ```markdown
      第一步内容

      <!-- step: fade -->

      第二步内容（淡入）

      <!-- step: slide-up -->

      第三步内容（滑入）
      ```

      +++

      ## 可用效果

      <!-- step: fade -->

      | 效果       | 说明     |
      | ---------- | -------- |
      | fade       | 淡入     |
      | slide-up   | 从下滑入 |
      | slide-down | 从上滑入 |
      | slide-left | 从右滑入 |
      | zoom       | 缩放     |
      | bounce     | 弹跳     |

      ---

      <!-- layout: doc -->
      <!-- transition: slideUp -->

      **下一步**：点击、→、↓、空格、Enter

      <!-- step: fade -->

      **上一步**：右键点击、←、↑

      <!-- step: fade -->

      **快捷跳转**：Home / End

      <!-- step: bounce -->

    <script type="module">
      import Matcha from "./matcha.js";

      const app = new Matcha({
        progressBar: {
          visible: true,
          color: "#00c853",
          position: "bottom",
        },
        style: {
          theme: "matcha",
        },
        transition: {
          type: "fade",
          duration: 700,
        },
        fragment: {
          duration: 500,
        },
      });

      app.start();
