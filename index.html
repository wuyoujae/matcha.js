      ## 分步语法

      使用 `<!-- step -->` 分隔内容

      <!-- step: fade -->

      ```markdown
      # 标题

      第一步内容

      <!-- step: fade -->

      第二步内容（淡入）

      <!-- step: slide-up -->

      第三步内容（从下滑入）
      ```

      +++

      ## 可用效果

      <!-- step: fade -->

      | 效果 | 说明 |
      |------|------|
      | fade | 淡入 |
      | slide-up | 从下滑入 |
      | slide-down | 从上滑入 |
      | slide-left | 从右滑入 |
      | slide-right | 从左滑入 |
      | zoom | 缩放 |
      | bounce | 弹跳 |

      ---

      <!-- layout: doc -->
      <!-- transition: slideUp -->

      ## 交互方式

      **下一步**：

      <!-- step: fade -->

      - 点击屏幕任意位置
      - 按 → 或 ↓ 键
      - 按空格或回车

      <!-- step: fade -->

      **上一步**：

      <!-- step: fade -->

      - 右键点击
      - 按 ← 或 ↑ 键

      <!-- step: bounce -->

      > 💡 分步内容是**累加显示**的，就像 PowerPoint！

      ---

      <!-- layout: center -->
      <!-- transition: cube -->
      <!-- theme: sunset -->

      ## 🌅 内容累加原理

      <!-- step: fade -->

      第1步：显示 "你好"

      <!-- step: slide-up -->

      第2步：显示 "你好" + "欢迎来到 Matcha!"

      <!-- step: slide-left -->

      第3步：继续累加更多内容...

      <!-- step: zoom -->

      就像真正的 PPT 动画！

      ## 📸 图文混排

      <!-- step: fade -->

      支持灵活的布局

      <!-- step: slide-left -->

      - 居中布局 (center)
      - 横分布局 (cols)
      - 纵分布局 (rows)
      - 文档布局 (doc)

      <!-- step: zoom -->

      **每种布局都支持分步！**

      <!-- layout: center -->
      <!-- transition: flip -->
      <!-- theme: matcha -->

      ## ⚡ 快速开始

      <!-- step: fade -->

      ```html
      <script type="module">
        import Matcha from "./matcha.js";

        new Matcha({
          style: { theme: "ocean" },
          transition: { type: "slide" },
          fragment: { duration: 400 }
        }).start();
      </script>
      ```

      ---

      <!-- layout: center -->
      <!-- transition: zoom -->

      # 🙏 感谢使用

      <!-- step: fade -->

      ### Matcha.js V6

      <!-- step: slide-up -->

      ✨ 每页独立主题 · 🎬 独立动画 · 👆 分步展示

      <!-- step: bounce -->

      **超越 Reveal.js 的轻量框架**

      <!-- step: zoom -->

      *右键可以回退哦~*
    </script>

    <script type="module">
      import Matcha from "./matcha.js";

      const app = new Matcha({
        progressBar: {
          visible: true,
          color: "#00c853",
          position: "bottom",
        },
        style: {
          theme: "matcha",
        },
        transition: {
          type: "fade",
          duration: 600,
        },
        fragment: {
          duration: 400,
        },
      });

      app.start();

      // 暴露到全局方便调试
      window.matcha = app;
    </script>
