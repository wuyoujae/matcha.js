      ## 📝 分步语法

      <!-- step -->

      简单的分步标记：

      ```markdown
      <!-- step -->
      这段内容点击后显示

      <!-- step: slide-up -->
      带效果的分步

      <!-- step: zoom, delay=200 -->
      带延迟的分步
      ```

      +++

      ## 可用效果

      <!-- step: slide-up -->

      | 效果 | 说明 |
      |------|------|
      | fade | 淡入 |
      | slide-up | 从下滑入 |
      | slide-down | 从上滑入 |
      | slide-left | 从右滑入 |
      | slide-right | 从左滑入 |
      | zoom | 缩放 |
      | bounce | 弹跳 |

      ---

      <!-- layout: doc -->
      <!-- transition: slideUp -->

      ## 交互方式

      <!-- step -->

      **下一步**：
      - 点击屏幕任意位置
      - 按 → 或 ↓ 键
      - 按空格或回车

      <!-- step -->

      **上一步**：
      - 右键点击
      - 按 ← 或 ↑ 键

      <!-- step -->

      **快捷跳转**：
      - Home 键 → 第一页
      - End 键 → 最后一页

      <!-- step: bounce -->

      > 💡 分步展示和页面切换无缝衔接，就像真正的 PPT！

      ## ⚡ 快速开始

      <!-- step -->

      ```html
      <script type="module">
        import Matcha from "./matcha.js";

        new Matcha({
          style: { theme: "ocean" },
          transition: { type: "slide" },
          fragment: { duration: 400 }
        }).start();
      </script>
      ```

      # 🙏 感谢使用

      ### Matcha.js V6

      <!-- step: fade -->

      ✨ 每页独立主题

      <!-- step: slide-up -->

      🎬 每页独立动画

      <!-- step: slide-left -->

      👆 分步展示支持

      <!-- step: bounce -->

      <!-- step: zoom -->

    </script>

    <script type="module">
      import Matcha from "./matcha.js";

      const app = new Matcha({
        progressBar: {
          visible: true,
          color: "#00c853",
          position: "bottom",
        },
        style: {
          theme: "matcha",
        },
        transition: {
          type: "fade",
          duration: 600,
        },
        fragment: {
          duration: 400,
        },
      });

      app.start();

      // 暴露到全局方便调试
      window.matcha = app;
    </script>
